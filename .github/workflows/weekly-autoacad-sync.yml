name: Weekly AutoAcad Sync

on:
  schedule:
    # GitHub Actions schedules run in UTC. Trigger both DST variants and gate in-job.
    - cron: '0 14 * * 1'
    - cron: '0 15 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-autoacad-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      REPOS_DIR: /tmp/autoacad-upstreams
      OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
      OPENAI_MODEL_NAME: ${{ vars.OPENAI_MODEL_NAME }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check local-time execution window
        id: window
        env:
          TZ: America/New_York
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(date +%H:%M)" = "10:00" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip duplicate UTC slot
        if: steps.window.outputs.run != 'true'
        run: echo "Outside the America/New_York 10:00 window; skipping."

      - name: Check out AutoAcad
        if: steps.window.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Configure git identity
        if: steps.window.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone upstream repos
        if: steps.window.outputs.run == 'true'
        run: |
          rm -rf "$REPOS_DIR"
          mkdir -p "$REPOS_DIR"
          git clone --depth 1 https://github.com/aiming-lab/AutoResearchClaw.git "$REPOS_DIR/AutoResearchClaw"
          git clone --depth 1 https://github.com/HKUDS/AI-Researcher.git "$REPOS_DIR/AI-Researcher"

      - name: Refresh upstream state
        if: steps.window.outputs.run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/update_from_upstreams.py \
            --repos-dir "$REPOS_DIR" \
            --skill-dir "$GITHUB_WORKSPACE" \
            --use-llm-if-configured

      - name: Detect changes
        if: steps.window.outputs.run == 'true'
        id: changes
        run: |
          if git diff --quiet -- .; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.window.outputs.run == 'true' && steps.changes.outputs.changed == 'true'
        env:
          BRANCH_NAME: automation/weekly-autoacad-sync
        run: |
          git checkout -B "$BRANCH_NAME"
          git add references/upstreams.md references/upstream-snapshots
          if [ -f references/upstream-review.md ]; then
            git add references/upstream-review.md
          fi
          git commit -m "chore: refresh autoacad upstream state"
          git push --force-with-lease origin "$BRANCH_NAME"

          if gh pr view "$BRANCH_NAME" --json number >/dev/null 2>&1; then
            gh pr edit "$BRANCH_NAME" \
              --title "chore: refresh AutoAcad upstream state" \
              --body "Automated weekly upstream refresh generated by GitHub Actions."
          else
            gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "chore: refresh AutoAcad upstream state" \
              --body "Automated weekly upstream refresh generated by GitHub Actions."
          fi

      - name: No changes
        if: steps.window.outputs.run == 'true' && steps.changes.outputs.changed != 'true'
        run: echo "No AutoAcad updates detected."
