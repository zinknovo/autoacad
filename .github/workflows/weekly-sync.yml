name: Weekly Upstream Sync

on:
  schedule:
    # Every Monday 06:00 UTC (~02:00 EDT)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout autoacad
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone upstream repos
        run: |
          mkdir -p /tmp/repos
          git clone --depth 1 https://github.com/aiming-lab/AutoResearchClaw.git /tmp/repos/AutoResearchClaw
          git clone --depth 1 https://github.com/HKUDS/AI-Researcher.git /tmp/repos/AI-Researcher

      - name: Configure git identity
        run: |
          git config user.name "autoacad-sync-bot"
          git config user.email "autoacad-sync-bot@users.noreply.github.com"

      - name: Run upstream sync + LLM auto-apply
        id: sync
        env:
          OPENAI_API_BASE: https://api.deepseek.com
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_MODEL_NAME: deepseek-v4-flash
          OPENAI_THINKING_TYPE: disabled
        run: |
          python3 scripts/update_from_upstreams.py \
            --repos-dir /tmp/repos \
            --skill-dir . \
            --use-llm-if-configured \
            --auto-apply \
            | tee /tmp/sync-result.json
          echo "result=$(cat /tmp/sync-result.json | tr -d '\n' | head -c 2000)" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no changes — skipping commit"
            exit 0
          fi
          git add -A
          SUMMARY=$(python3 -c "import json,sys; d=json.load(open('/tmp/sync-result.json')); aa=d.get('auto_apply') or {}; print(aa.get('summary') or '')")
          TITLE="chore: weekly auto-sync $(date -u +%Y-%m-%d)"
          if [ -n "$SUMMARY" ]; then
            git commit -m "$TITLE" -m "$SUMMARY"
          else
            git commit -m "$TITLE"
          fi
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `weekly auto-sync failed (${today})`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['auto-sync', 'failure']
            });
